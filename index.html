<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date - Allyson &amp; Pranjal · Dec 19 &amp; 20, 2026</title>
  <meta name="description" content="Save the Date for Allyson and Pranjal's wedding — December 19 &amp; 20, 2026 in Lucknow, Uttar Pradesh, India">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: url('couple1.jpg') 65% 60% / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 3rem 1rem 3rem 5%;
    }
    .card {
      width: 500px;
      max-width: 100%;
      background: #fdf8f2;
      border: 1.5px solid #c9a84c;
      border-radius: 4px;
      position: relative;
      text-align: center;
      overflow: hidden;
    }
    .card-inner { padding: 3rem 2.5rem; }
    .corner { position: absolute; width: 90px; height: 90px; pointer-events: none; }
    .corner-tl { top: 0; left: 0; }
    .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner-br { bottom: 0; right: 0; transform: scale(-1); }
    .divider { height: 0.5px; background: #e8d5a3; margin: 0 0 1.5rem; }
    .countdown { display: flex; justify-content: center; margin: 0 0 1.75rem; }
    .cd-box {
      padding: 0.6rem 0.9rem;
      text-align: center;
      border: 0.5px solid #e8d5a3;
      background: #fdf3e7;
      min-width: 64px;
    }
    .cd-box + .cd-box { border-left: none; }
    .cd-box:first-child { border-radius: 4px 0 0 4px; }
    .cd-box:last-child  { border-radius: 0 4px 4px 0; }
    .cd-num {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      color: #3d2c1e;
      line-height: 1;
    }
    .cd-lbl {
      font-size: 9px;
      color: #9b7d2c;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .rsvp-btn {
      display: inline-block;
      background: #c9a84c;
      color: #fff;
      text-decoration: none;
      padding: 10px 36px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      letter-spacing: 0.12em;
      border-radius: 2px;
      transition: background 0.15s;
    }
    .rsvp-btn:hover { background: #b8943e; }
    @media (max-width: 768px) {
      body {
        background: url('couple1.jpg') center 40% / cover no-repeat scroll;
        justify-content: center;
        padding: 2rem 1rem;
      }
    }
    @media (max-width: 540px) {
      .card-inner { padding: 2.5rem 1.5rem; }
      .cd-box { min-width: 52px; padding: 0.5rem 0.6rem; }
      .cd-num { font-size: 22px; }
    }
  </style>
</head>

    <ellipse cx="21" cy="44" rx="6" ry="2.5" fill="#c9a84c" opacity="0.28" transform="rotate(-58 21 44)"/>

  <div class="card-inner">

    <p style="font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;letter-spacing:0.2em;color:#c0b09a;text-transform:uppercase;margin:1.25rem 0 0;">Formal invitation to follow</p>

  </div>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    var diff = new Date('2026-12-20T00:00:00') - new Date();
    if (diff <= 0) {
      document.getElementById('cd-d').textContent = '0';
      ['cd-h', 'cd-m', 'cd-s'].forEach(function(id) {
        document.getElementById(id).textContent = '00';
      });
      return;
    }
    document.getElementById('cd-d').textContent = Math.floor(diff / 864e5);
    document.getElementById('cd-h').textContent = pad(Math.floor(diff % 864e5 / 36e5));
    document.getElementById('cd-m').textContent = pad(Math.floor(diff % 36e5 / 6e4));
    document.getElementById('cd-s').textContent = pad(Math.floor(diff % 6e4 / 1e3));
  }
  tick();
  setInterval(tick, 1000);
</script>
